# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: 'Build and deploy JAR app to Azure Web App: agro-api-ESG'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      
      SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME}}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java version
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Make mvnw executable
      run: chmod +x mvnw
    
    - name: Build with Maven (skip tests)
      run: ./mvnw -B -DskipTests package

    - name: Login to Azure (optional, for app settings)
      if: ${{ secrets.AZURE_CREDENTIALS != '' && secrets.AZURE_RESOURCE_GROUP != '' }}
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set Postgres env vars in Azure Web App (optional)
      if: ${{ secrets.AZURE_CREDENTIALS != '' && secrets.AZURE_RESOURCE_GROUP != '' && secrets.POSTGRES_JDBC_URL != '' }}
      uses: azure/cli@v2
      with:
        azcliversion: 2.60.0
        inlineScript: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "agro-api-ESG" \
            --settings \
              SPRING_DATASOURCE_URL="${{ secrets.POSTGRES_JDBC_URL }}" \
              SPRING_DATASOURCE_USERNAME="${{ secrets.POSTGRES_USERNAME }}" \
              SPRING_DATASOURCE_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with: 
        app-name: 'agro-api-ESG'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_9fe7e2c40da94504b99fe27de4dceddb }}
        package: '${{ github.workspace }}/target/*.jar'
