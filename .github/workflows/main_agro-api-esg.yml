name: 'Build and deploy JAR app to Azure Web App: agro-api-ESG'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      AZURE_WEBAPP_NAME: agro-api-ESG
      JAR_NAME: vits-agrochain-0.0.1-SNAPSHOT.jar
      SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Wait for Postgres
        shell: bash
        run: |
          set -e
          for i in {1..30}; do
            (echo > /dev/tcp/postgres/5432) >/dev/null 2>&1 && echo "Postgres is up" && exit 0
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Run unit tests
        run: mvn -B test
        env:
          # For CI tests, use the service container DB (not Azure settings)
          SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Package JAR
        run: mvn -B package -DskipTests

      # DEBUG (pode remover depois)
      - name: List target files
        run: ls -l target

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: production
          publish-profile: ${{ secrets.AzureAppService_PublishProfile_9fe7e2c40da94504b99fe27de4dceddb }}
          package: target/${{ env.JAR_NAME }}
