name: 'Build and deploy JAR app to Azure Web App: agro-api-ESG'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      AZURE_WEBAPP_NAME: agro-api-ESG
      JAR_NAME: vits-agrochain-0.0.1-SNAPSHOT.jar


      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven


      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            echo "Waiting for database..."
            sleep 5
          done


      - name: Run tests
        run: mvn -B test


      - name: Package JAR
        run: mvn -B package -DskipTests

      - name: List target files
        run: ls -l target

      - name: Verify JAR exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "target/${{ env.JAR_NAME }}" || (echo "JAR not found: target/${{ env.JAR_NAME }}" && ls -la target && exit 1)


      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: production
          publish-profile: ${{ secrets.AzureAppService_PublishProfile_9fe7e2c40da94504b99fe27de4dceddb }}
          package: target/${{ env.JAR_NAME }}